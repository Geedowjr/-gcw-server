app = "gcw-server"
primary_region = "arn"

[build]

[deploy]
  release_command = "npm run migrate"

[processes]
  api = "npm run start"
  worker = "npm run worker"

[env]
  NODE_ENV = "production"
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["api"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  processes = ["api"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[vm]]
  processes = ["worker"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
  restart = { policy = "always" }
