version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gcw
      POSTGRES_PASSWORD: gcw
      POSTGRES_DB: gcw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gcw"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: sh -c "npm run migrate && npm run seed && npm run start"
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://gcw:gcw@postgres:5432/gcw
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: npm run worker
    env_file: .env
    environment:
      DATABASE_URL: postgres://gcw:gcw@postgres:5432/gcw
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  pgdata:
